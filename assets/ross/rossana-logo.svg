<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="orb-grad" cx="38%" cy="33%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#FFD4A0"/>
      <stop offset="30%"  stop-color="#F4956A"/>
      <stop offset="65%"  stop-color="#E07060"/>
      <stop offset="100%" stop-color="#C8A0B8"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Soft glow ring behind orb -->
  <circle cx="200" cy="200" r="175" fill="#F4906A" opacity="0.18" filter="url(#glow)"/>

  <!-- Main orb -->
  <circle cx="200" cy="200" r="155" fill="url(#orb-grad)"/>

  <!-- Eyes — two gentle arcs -->
  <path d="M 148 178 Q 163 166 178 178" stroke="rgba(255,255,255,0.82)" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M 222 178 Q 237 166 252 178" stroke="rgba(255,255,255,0.82)" stroke-width="9" fill="none" stroke-linecap="round"/>

  <!-- Smile -->
  <path d="M 150 228 Q 200 268 250 228" stroke="rgba(255,255,255,0.88)" stroke-width="9" fill="none" stroke-linecap="round"/>
</svg>
